name: Capacitor Android Cloud Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Android APK via Gradle
      run: |
        # Navigate directly into the Capacitor android folder
        cd android
        
        # Grant permissions to the compiler tool
        chmod +x gradlew
        
        # Compile the debug app package
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: water-tracker-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
