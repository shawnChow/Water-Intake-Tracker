name: Android Cloud Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Forces the cloud runner to use the updated Node24 runtime environment
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # Disabling gradle cache checks fixes the root folder search error
        cache: '' 

    - name: Grant Execute Permissions
      # CHANGE 'Water-Intake-Tracker' to match your exact folder name if different
      run: chmod +x ./Water-Intake-Tracker/gradlew

    - name: Build Debug APK
      # Runs the compiler directly inside your project folder
      run: |
        cd Water-Intake-Tracker
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: my-ai-app-apk
        path: Water-Intake-Tracker/app/build/outputs/apk/debug/app-debug.apk
