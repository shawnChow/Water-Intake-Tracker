name: Capacitor Android Cloud Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Ensures correct version matching your local device

    - name: Install Dependencies & Sync Android Engine
      # Crucial Fix: Installs packages and hooks up the missing :capacitor-android files
      run: |
        npm ci
        npm run build
        npx cap sync android

    - name: Build Android APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: water-tracker-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
